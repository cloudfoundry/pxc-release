- type: replace
  path: /instance_groups/name=mysql/jobs/name=pxc-replicator?
  value:
    name: pxc-replicator
    release: pxc
    properties:
      config.tls.enabled: true

- type: replace
  path: /instance_groups/name=mysql/jobs/name=pxc-mysql/properties/engine_config?/binlog?/enable_gtid_mode?
  value: true
